<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#06060c">
  <title>PhantomPad</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060c;
      --primary: #00e5ff;
      --primary-glow: rgba(0,229,255,0.3);
      --secondary: #7c4dff;
      --text: #e8e8f0;
      --text-dim: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --surface: rgba(255,255,255,0.04);
      --success: #00e676;
      --danger: #ff1744;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Connect Screen ===== */
    #connect-screen {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, rgba(0,229,255,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 80%, rgba(124,77,255,0.04) 0%, transparent 50%),
                  var(--bg);
      padding: 24px;
      position: relative;
    }

    #connect-screen::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .connect-logo {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px var(--primary-glow));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .connect-logo h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--text), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .connect-logo p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 6px;
    }

    .connect-form {
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .server-input {
      width: 100%;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      text-align: center;
      transition: all 0.2s;
    }

    .server-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0,229,255,0.1);
    }

    .connect-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #00b8d4);
      border: none;
      border-radius: 14px;
      color: #000;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }

    .connect-btn:active { transform: scale(0.97); }
    .connect-btn:disabled { opacity: 0.5; }

    .connect-status {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
    }

    .connect-status.error { color: var(--danger); }
    .connect-status.success { color: var(--success); }
    .connect-status.connecting { color: var(--primary); }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      color: var(--text-dim);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .recent-servers {
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }

    .recent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .recent-item:active {
      border-color: var(--primary);
      background: rgba(0,229,255,0.08);
      transform: scale(0.98);
    }

    .recent-ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
    }

    .recent-time {
      font-size: 11px;
      color: var(--text-dim);
    }

    .recent-delete {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      padding: 4px 8px;
      cursor: pointer;
    }

    /* Controller iframe */
    #controller-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,229,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="connect-screen">
    <div class="connect-logo">
      <span class="logo-icon">⚡</span>
      <h1>PhantomPad</h1>
      <p>Wireless Game Controller</p>
    </div>

    <div class="connect-form">
      <div class="input-group">
        <label>Server IP Address</label>
        <input type="text" class="server-input" id="server-ip" placeholder="192.168.1.100" inputmode="url" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Port</label>
        <input type="text" class="server-input" id="server-port" placeholder="3000" value="3000" inputmode="numeric">
      </div>
      <button class="connect-btn" id="connect-btn">CONNECT</button>
      <div class="connect-status" id="connect-status"></div>
    </div>

    <div class="recent-servers" id="recent-section">
      <div class="divider">Recent Servers</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <iframe id="controller-frame" class="hidden"></iframe>

  <script>
    (function() {
      'use strict';

      const STORAGE = 'phantompad_servers';
      const MAX = 5;

      function getRecent() { try { return JSON.parse(localStorage.getItem(STORAGE)) || []; } catch(e) { return []; } }
      function save(ip, port) {
        let s = getRecent().filter(x => !(x.ip === ip && x.port === port));
        s.unshift({ ip, port, time: Date.now() });
        localStorage.setItem(STORAGE, JSON.stringify(s.slice(0, MAX)));
      }
      function remove(ip, port) {
        localStorage.setItem(STORAGE, JSON.stringify(getRecent().filter(x => !(x.ip === ip && x.port === port))));
        renderRecent();
      }

      function timeAgo(ts) {
        const d = Date.now() - ts;
        if (d < 60000) return 'Just now';
        if (d < 3600000) return Math.floor(d/60000) + 'm ago';
        if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
        return Math.floor(d/86400000) + 'd ago';
      }

      function renderRecent() {
        const servers = getRecent();
        const list = document.getElementById('recent-list');
        const section = document.getElementById('recent-section');
        if (!servers.length) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        list.innerHTML = servers.map(s => `
          <div class="recent-item" data-ip="${s.ip}" data-port="${s.port}">
            <div><div class="recent-ip">${s.ip}:${s.port}</div><div class="recent-time">${timeAgo(s.time)}</div></div>
            <button class="recent-delete" data-ip="${s.ip}" data-port="${s.port}">✕</button>
          </div>`).join('');

        list.querySelectorAll('.recent-item').forEach(item => {
          item.addEventListener('click', (e) => {
            if (e.target.classList.contains('recent-delete')) { e.stopPropagation(); remove(e.target.dataset.ip, e.target.dataset.port); return; }
            document.getElementById('server-ip').value = item.dataset.ip;
            document.getElementById('server-port').value = item.dataset.port;
            connect();
          });
        });
      }

      const statusEl = document.getElementById('connect-status');

      async function connect() {
        const ip = document.getElementById('server-ip').value.trim();
        const port = document.getElementById('server-port').value.trim() || '3000';
        if (!ip) { statusEl.className = 'connect-status error'; statusEl.textContent = 'Enter IP address'; return; }

        const btn = document.getElementById('connect-btn');
        btn.disabled = true;
        statusEl.className = 'connect-status connecting';
        statusEl.innerHTML = '<span class="spinner"></span>Connecting...';

        const url = `http://${ip}:${port}`;
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 5000);
          const r = await fetch(`${url}/api/info`, { signal: ctrl.signal });
          clearTimeout(t);
          if (!r.ok) throw new Error();

          statusEl.className = 'connect-status success';
          statusEl.textContent = 'Connected! Loading...';
          save(ip, port);

          // Load controller in iframe for Capacitor compatibility
          const frame = document.getElementById('controller-frame');
          frame.src = `${url}/controller`;
          frame.classList.remove('hidden');
          document.getElementById('connect-screen').classList.add('hidden');

        } catch (e) {
          statusEl.className = 'connect-status error';
          statusEl.textContent = e.name === 'AbortError' ? 'Timed out — check IP & server' : `Can't reach ${url}`;
          btn.disabled = false;
        }
      }

      document.getElementById('connect-btn').addEventListener('click', connect);
      document.querySelectorAll('.server-input').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); }));

      const servers = getRecent();
      if (servers.length) {
        document.getElementById('server-ip').value = servers[0].ip;
        document.getElementById('server-port').value = servers[0].port;
      }

      renderRecent();
    })();
  </script>
</body>
</html>
